<!DOCTYPE html>
<html lang="pt-BR">
	<head>
		<title>ASCII Video Editor</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
    	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
		<link href="https://fonts.googleapis.com/css2?family=Astloch:wght@400;700&display=swap" rel="stylesheet">
		<style>
			:root {
				--control-bg: rgba(0, 0, 0, 0.85);
				--border-color: rgba(255, 255, 255, 0.2);
				--text-color: #ccc;
				--highlight-color: #fff;
				--record-color: #d32f2f;
			}
			html, body {
				width: 100%;
				height: 100%;
				margin: 0;
				padding: 0;
				overflow: hidden;
				background-color: #000;
				font-family: 'Inter', sans-serif;
				color: var(--text-color);
			}
			video, #hidden-canvas {
				display: none;
			}
			#output-canvas {
				position: absolute;
				top: 0;
				left: 0;
				width: 100%;
				height: 100%;
				display: block;
			}

			/* INTERFACE DE EDIÇÃO */
			#toggle-button {
				position: absolute;
				bottom: 20px;
				left: 50%;
				transform: translateX(-50%);
				width: 50px;
				height: 50px;
				border-radius: 50%;
				background: var(--control-bg);
				border: 1px solid var(--border-color);
				box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
				display: flex;
				align-items: center;
				justify-content: center;
				cursor: pointer;
				z-index: 101;
				transition: background-color 0.2s;
				backdrop-filter: blur(10px);
			}
			#toggle-button:hover { background: rgba(255, 255, 255, 0.1); }

			#controls-bar {
				position: absolute;
				bottom: 85px;
				left: 50%;
				transform: translateX(-50%);
				background: var(--control-bg);
				backdrop-filter: blur(10px);
				border: 1px solid var(--border-color);
				box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
				width: 90vw;
				max-width: 850px;
				padding: 20px;
				transition: opacity 0.3s ease, transform 0.3s ease;
				border-radius: 8px;
				z-index: 100;
				box-sizing: border-box;
			}
			#controls-bar:not(.expanded) {
				opacity: 0;
				transform: translateX(-50%) translateY(20px);
				pointer-events: none;
			}

			#toggle-arrow {
				fill: var(--highlight-color);
				width: 24px;
				height: 24px;
				transition: transform 0.3s ease;
			}
			#controls-bar.expanded ~ #toggle-button #toggle-arrow { transform: rotate(180deg); }

			.controls-grid {
				display: grid;
				grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
				gap: 20px;
			}
			.control-group {
				display: flex;
				flex-direction: column;
				gap: 12px;
			}
			.control-row {
				display: flex;
				align-items: center;
				justify-content: space-between;
				gap: 10px;
			}
			.control-row label { flex-grow: 1; font-size: 13px;}
			
			input[type="range"], input[type="text"], button {
				background: #1a1a1a;
				border: 1px solid #444;
				color: var(--highlight-color);
				padding: 8px 12px;
				font-family: 'Inter', sans-serif;
				width: 100%;
				box-sizing: border-box;
				border-radius: 4px;
			}
			input[type="text"] { width: 60%; }
			
			button {
				cursor: pointer;
				transition: all 0.2s;
				font-weight: bold;
			}
			button:hover { background: #333; }

			.btn-record { border-color: var(--record-color); color: var(--record-color); }
			.btn-record:hover { background: var(--record-color); color: #fff; }
			.recording { background: var(--record-color) !important; color: #fff !important; animation: pulse 1.5s infinite; }

			@keyframes pulse {
				0% { box-shadow: 0 0 0 0 rgba(211, 47, 47, 0.7); }
				70% { box-shadow: 0 0 0 10px rgba(211, 47, 47, 0); }
				100% { box-shadow: 0 0 0 0 rgba(211, 47, 47, 0); }
			}

			input[type="color"] {
				-webkit-appearance: none;
				appearance: none;
				width: 40px;
				height: 28px;
				background-color: transparent;
				border: 1px solid #444;
				cursor: pointer;
				padding: 0;
				border-radius: 4px;
			}
			input[type="color"]::-webkit-color-swatch { border: none; border-radius: 3px; }
			input[type="checkbox"] { accent-color: var(--highlight-color); width: 18px; height: 18px; }

			input[type="range"] {
				-webkit-appearance: none;
				padding: 0;
				height: 6px;
				background: #333;
				border-radius: 3px;
			}
			input[type="range"]::-webkit-slider-thumb {
				-webkit-appearance: none;
				height: 16px;
				width: 16px;
				background: var(--highlight-color);
				cursor: pointer;
				border-radius: 50%;
			}

			.button-group { display: flex; gap: 10px; }
			.interface-title {
				font-family: 'Astloch', cursive;
				font-weight: 700;
				font-size: 2rem;
				color: var(--highlight-color);
				margin-bottom: 5px;
			}

			@media (max-width: 768px) {
				#controls-bar { width: 95vw; bottom: 75px; max-height: 70vh; overflow-y: auto;}
				.controls-grid { grid-template-columns: 1fr; }
				.interface-title { text-align: center; }
			}
		</style>
	</head>

	<body>
		<canvas id="output-canvas"></canvas>

		<video id="video" autoplay playsinline muted loop></video>
		<canvas id="hidden-canvas"></canvas>
		<input type="file" id="video-upload" accept="video/*" style="display: none;">
		
		<div id="controls-bar" class="expanded">
			<div class="controls-grid">
				<div class="control-group">
					<div class="interface-title">ASCII Editor</div>
					<div class="button-group">
						<button id="upload-btn">Carregar Vídeo</button>
						<button id="webcam-btn">Usar Webcam</button>
					</div>
					<hr style="border-top: 1px solid var(--border-color); width: 100%; margin: 5px 0;">
					<div class="button-group">
						<button id="export-image-btn">Exportar Foto</button>
						<button id="record-video-btn" class="btn-record">Gravar Vídeo</button>
					</div>
				</div>

				<div class="control-group">
					<div class="control-row">
						<label for="ascii-text">Texto Base ASCII</label>
						<input type="text" id="ascii-text" value="ganwalk">
					</div>
					<div class="control-row">
						<label for="bg-color-picker">Cor de Fundo</label>
						<input type="color" id="bg-color-picker">
					</div>
					<div class="control-row">
						<label for="bg-gradient-check">Fundo com Vídeo?</label>
						<input type="checkbox" id="bg-gradient-check">
					</div>
					<label for="bg-opacity-slider" style="font-size: 12px;">Opacidade do Fundo de Vídeo</label>
					<input type="range" id="bg-opacity-slider" min="0" max="100" step="1">
					<div class="control-row">
						<label for="font-color1-picker">Cor do Texto (Escuro)</label>
						<input type="color" id="font-color1-picker">
					</div>
					<div class="control-row">
						<label for="font-color2-picker">Cor do Texto (Claro)</label>
						<input type="color" id="font-color2-picker">
					</div>
				</div>

				<div class="control-group">
					<label for="font-size-slider" style="font-size: 12px;">Tamanho da Fonte</label>
					<input type="range" id="font-size-slider" min="1" max="20" step="1">
					<label for="resolution-slider" style="font-size: 12px;">Resolução (Grid)</label>
					<input type="range" id="resolution-slider" min="10" max="150" step="1">
					<label for="threshold-slider" style="font-size: 12px;">Corte de Sombra (Threshold)</label>
					<input type="range" id="threshold-slider" min="0" max="255" step="1">
					<div class="control-row">
						<label for="invert-check">Inverter Cores?</label>
						<input type="checkbox" id="invert-check">
					</div>
					<label for="randomness-slider" style="font-size: 12px;">Tremor/Aleatoriedade</label>
					<input type="range" id="randomness-slider" min="0" max="20" step="1">
				</div>
			</div>
		</div>

		<div id="toggle-button">
			<svg id="toggle-arrow" viewBox="0 0 24 24"><path d="M7.41 15.41L12 10.83l4.59 4.58L18 14l-6-6-6 6z"/></svg>
		</div>

		<script>
			const video = document.getElementById('video');
			const hiddenCanvas = document.getElementById('hidden-canvas');
			const hiddenCtx = hiddenCanvas.getContext('2d', { willReadFrequently: true });
			const outputCanvas = document.getElementById('output-canvas');
			const outputCtx = outputCanvas.getContext('2d');
			const videoUpload = document.getElementById('video-upload');

			let stream;
			let mediaRecorder;
			let recordedChunks = [];
			let isRecording = false;
			
			const settings = {
				asciiText: 'ganwalk', // Novo parâmetro
				backgroundColor: '#000000',
				bgGradient: false,
				bgSaturation: 72,
				fontColor: '#00ffff',
				fontColor2: '#ff7100',
				fontSizeFactor: 10,
				resolution: window.innerWidth <= 768 ? 30 : 50,
				threshold: 0,
				invert: false,
				randomness: 0
			};

			function getCharSet() {
				return settings.asciiText || " ";
			}
			
			function toAscii(grayData, width, height) {
				const charSet = getCharSet();
				let asciiLines = [];
				let userTextIndex = 0; 
				const finalGrayScales = new Uint8Array(grayData.length);

				for (let y = 0; y < height; y++) {
					let line = '';
					for (let x = 0; x < width; x++) {
						const pixelIndex = x + y * width;
						let gray = grayData[pixelIndex];

						if (settings.invert) gray = 255 - gray;
						finalGrayScales[pixelIndex] = gray;

						if (gray < settings.threshold) {
							line += ' ';
							continue;
						}

						let character;
						if (charSet && charSet.length > 0) {
							let finalIndex = userTextIndex;
							if (settings.randomness > 0) {
								const rand = Math.floor((Math.random() - 0.5) * settings.randomness);
								finalIndex += rand;
							}
							character = charSet[Math.abs(finalIndex) % charSet.length];
							userTextIndex++;
						} else {
							character = ' ';
						}
						
						line += character;
					}
					asciiLines.push(line);
				}
				return { asciiLines, finalGrayScales };
			}

			function hexToRgb(hex) {
				if (!hex) return { r: 0, g: 0, b: 0 };
				const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
				return result ? {
					r: parseInt(result[1], 16),
					g: parseInt(result[2], 16),
					b: parseInt(result[3], 16)
				} : { r: 0, g: 0, b: 0 };
			}

			function draw() {
				outputCanvas.width = window.innerWidth;
				outputCanvas.height = window.innerHeight;

				// Tela inicial se não houver vídeo
				if (!video.videoWidth || (!video.srcObject && !video.src)) {
					outputCtx.fillStyle = settings.backgroundColor;
					outputCtx.fillRect(0, 0, outputCanvas.width, outputCanvas.height);
					outputCtx.fillStyle = settings.fontColor2;
					outputCtx.textAlign = 'center';
					outputCtx.textBaseline = 'middle';
					outputCtx.font = '20px Inter, sans-serif';
					outputCtx.fillText('Carregue um vídeo ou use a webcam para iniciar.', outputCanvas.width / 2, outputCanvas.height / 2);
					requestAnimationFrame(draw);
					return;
				}
				
				const screenAspectRatio = outputCanvas.width / outputCanvas.height;
				let gridWidth, gridHeight;

				if (screenAspectRatio >= 1) {
					gridWidth = Math.floor(settings.resolution * 2 * screenAspectRatio);
					gridHeight = Math.floor(settings.resolution * 2);
				} else {
					gridWidth = Math.floor(settings.resolution * 2);
					gridHeight = Math.floor(settings.resolution * 2 / screenAspectRatio);
				}
				hiddenCanvas.width = gridWidth;
				hiddenCanvas.height = gridHeight;

				const videoAspectRatio = video.videoWidth / video.videoHeight;
				const gridAspectRatio = gridWidth / gridHeight; 
				let sWidth, sHeight, sx, sy;

				if (videoAspectRatio > gridAspectRatio) {
					sHeight = video.videoHeight;
					sWidth = sHeight * gridAspectRatio;
					sx = (video.videoWidth - sWidth) / 2;
					sy = 0;
				} else {
					sWidth = video.videoWidth;
					sHeight = sWidth / gridAspectRatio;
					sx = 0;
					sy = (video.videoHeight - sHeight) / 2;
				}

				hiddenCtx.drawImage(video, sx, sy, sWidth, sHeight, 0, 0, gridWidth, gridHeight);

				const imageData = hiddenCtx.getImageData(0, 0, gridWidth, gridHeight);
				const data = imageData.data;
				const grayScales = new Uint8Array(gridWidth * gridHeight);
				for (let i = 0; i < data.length; i += 4) {
					const r = data[i];
					const g = data[i + 1];
					const b = data[i + 2];
					grayScales[i / 4] = 0.2126 * r + 0.7152 * g + 0.0722 * b;
				}

				const { asciiLines, finalGrayScales } = toAscii(grayScales, gridWidth, gridHeight);

				outputCtx.textAlign = 'center';
				outputCtx.textBaseline = 'middle';

				const cellWidth = outputCanvas.width / gridWidth;
				const cellHeight = outputCanvas.height / gridHeight;

				if (settings.bgGradient) {
					outputCtx.fillStyle = settings.backgroundColor;
					outputCtx.fillRect(0, 0, outputCanvas.width, outputCanvas.height);
					outputCtx.globalAlpha = settings.bgSaturation / 100;
					outputCtx.imageSmoothingEnabled = false;
					outputCtx.drawImage(hiddenCanvas, 0, 0, outputCanvas.width, outputCanvas.height);
					outputCtx.imageSmoothingEnabled = true;
					outputCtx.globalAlpha = 1.0;
				} else {
					outputCtx.fillStyle = settings.backgroundColor;
					outputCtx.fillRect(0, 0, outputCanvas.width, outputCanvas.height);
				}
				
				const color1RGB = hexToRgb(settings.fontColor);
				const color2RGB = hexToRgb(settings.fontColor2);

				for (let y = 0; y < gridHeight; y++) {
					for (let x = 0; x < gridWidth; x++) {
						const pixelIndex = x + y * gridWidth;
						const character = asciiLines[y][x];

						if (character === ' ') continue;

						const gray = finalGrayScales[pixelIndex];
						const factor = gray / 255;

						const r = Math.floor(color1RGB.r + (color2RGB.r - color1RGB.r) * factor);
						const g = Math.floor(color1RGB.g + (color2RGB.g - color1RGB.g) * factor);
						const b = Math.floor(color1RGB.b + (color2RGB.b - color1RGB.b) * factor);
						
						outputCtx.fillStyle = `rgb(${r},${g},${b})`;

						const charSize = factor * cellHeight * (settings.fontSizeFactor / 5.0);
						if (charSize < 1) continue;

						outputCtx.font = `${charSize}px monospace`;
						outputCtx.fillText(character, x * cellWidth + cellWidth / 2, y * cellHeight + cellHeight / 2);
					}
				}
				requestAnimationFrame(draw);
			}
			
			async function setupWebcam() {
				video.src = '';
				try {
					if (stream) stream.getTracks().forEach(track => track.stop());
					stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
					video.srcObject = stream;
					video.loop = false;
					video.oncanplay = () => video.play();
				} catch (err) {
					alert("Erro ao acessar a câmera. Verifique as permissões.");
				}
			}

			function handleVideoUpload(event) {
				video.src = '';
				const file = event.target.files[0];
				if (file) {
					if (stream) { stream.getTracks().forEach(track => track.stop()); stream = null; }
					video.srcObject = null;
					video.src = URL.createObjectURL(file);
					video.loop = true;
					video.oncanplay = () => video.play();
				}
			}

			function exportImage() {
				const link = document.createElement('a');
				link.download = 'ascii-arte.png';
				link.href = outputCanvas.toDataURL('image/png');
				link.click();
			}

			// SISTEMA DE GRAVAÇÃO DE VÍDEO
			function toggleRecording() {
				const recordBtn = document.getElementById('record-video-btn');
				
				if (!isRecording) {
					recordedChunks = [];
					const canvasStream = outputCanvas.captureStream(30); // Grava a 30 FPS
					mediaRecorder = new MediaRecorder(canvasStream, { mimeType: 'video/webm' });
					
					mediaRecorder.ondataavailable = (e) => {
						if (e.data.size > 0) recordedChunks.push(e.data);
					};
					
					mediaRecorder.onstop = () => {
						const blob = new Blob(recordedChunks, { type: 'video/webm' });
						const url = URL.createObjectURL(blob);
						const a = document.createElement('a');
						a.style.display = 'none';
						a.href = url;
						a.download = 'ascii-video.webm';
						document.body.appendChild(a);
						a.click();
						window.URL.revokeObjectURL(url);
					};
					
					mediaRecorder.start();
					isRecording = true;
					recordBtn.textContent = 'Parar e Salvar Vídeo';
					recordBtn.classList.add('recording');
				} else {
					mediaRecorder.stop();
					isRecording = false;
					recordBtn.textContent = 'Gravar Vídeo';
					recordBtn.classList.remove('recording');
				}
			}

			document.addEventListener('DOMContentLoaded', () => {
				const controlsBar = document.getElementById('controls-bar');
				document.getElementById('toggle-button').addEventListener('click', () => controlsBar.classList.toggle('expanded'));
				
				// Bindings de Botões
				document.getElementById('upload-btn').addEventListener('click', () => videoUpload.click());
				document.getElementById('webcam-btn').addEventListener('click', setupWebcam);
				document.getElementById('export-image-btn').addEventListener('click', exportImage);
				document.getElementById('record-video-btn').addEventListener('click', toggleRecording);
				videoUpload.addEventListener('change', handleVideoUpload);

				// Bindings de Configurações
				const bindInput = (id, settingKey, isCheckbox = false) => {
					const el = document.getElementById(id);
					el.addEventListener('input', (e) => settings[settingKey] = isCheckbox ? e.target.checked : e.target.value);
					if (isCheckbox) el.checked = settings[settingKey];
					else el.value = settings[settingKey];
				};

				bindInput('ascii-text', 'asciiText');
				bindInput('bg-color-picker', 'backgroundColor');
				bindInput('bg-gradient-check', 'bgGradient', true);
				bindInput('bg-opacity-slider', 'bgSaturation');
				bindInput('font-color1-picker', 'fontColor');
				bindInput('font-color2-picker', 'fontColor2');
				bindInput('font-size-slider', 'fontSizeFactor');
				bindInput('resolution-slider', 'resolution');
				bindInput('threshold-slider', 'threshold');
				bindInput('invert-check', 'invert', true);
				bindInput('randomness-slider', 'randomness');

				window.addEventListener('resize', draw, false);
				draw(); // Inicia o loop visual
			});
		</script>
	</body>
</html>
